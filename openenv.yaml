name: email_triage
description: |
  Email Triage Environment - An interactive environment for training and evaluating AI agents on email classification and response prioritization tasks.

version: 1.0.0

# Environment specification
environment:
  type: interactive
  domain: email_management
  task_count: 9
  max_episode_length: 9

# API endpoints specification
api:
  base_url: /
  endpoints:
    - path: /
      method: GET
      description: Health check endpoint
      response:
        status: string
        environment: string
        version: string
        total_tasks: integer
        
    - path: /reset
      method: POST
      description: Reset environment and start new episode
      response:
        observation:
          email: string
          task_id: integer
        reward: number
        done: boolean
        info: object
        
    - path: /step
      method: POST
      description: Submit action and advance environment
      request:
        category: string
        response: string
      response:
        observation:
          email: string
          task_id: integer
        reward: number
        done: boolean
        info: object
        
    - path: /state
      method: GET
      description: Get current environment state
      response:
        current_task:
          email: string
          task_id: integer
        task_index: integer
        total_tasks: integer
        episode_done: boolean
        total_reward: number

# Task specification
tasks:
  count: 9
  categories:
    - urgent
    - normal
    - spam
  responses:
    - reply
    - ignore
    - escalate

# Evaluation specification
evaluation:
  reward_system:
    category_correct: 0.5
    response_correct: 0.5
    max_total: 9.0
  
  performance_thresholds:
    excellent: 0.90
    good: 0.75
    fair: 0.60
    needs_improvement: 0.00

# Dependencies
dependencies:
  - fastapi==0.104.1
  - uvicorn==0.24.0
  - pydantic==2.5.0

# Authors
authors:
  - name: Hack Maestros
    competition: OpenEnv Round 1
